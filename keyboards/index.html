<style>
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  img {
    max-width: 100%;
    display: block;
  }

  .gallery div {
    position: relative;
  }

  .gallery span {
    visibility: hidden;
    position: absolute;
    top: 0;
    right: 0;
    color: var(--antique-white);
    background: var(--cafe-noir);
    padding: 0.5em;
  }

  .gallery div:hover span {
    visibility: visible;
  }
</style>
